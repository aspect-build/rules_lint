name: CI

on:
  push:
    branches: [main, 1.x]
  pull_request:
    branches: [main, 1.x]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  id-token: write

jobs:
  list-examples:
    runs-on: ubuntu-latest
    outputs:
      format-matrix: ${{ steps.set-format-matrix.outputs.matrix }}
      test-matrix: ${{ steps.set-test-matrix.outputs.matrix }}
      lint-matrix: ${{ steps.set-lint-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Verify bcr patches
        run: patch --dry-run -p1 --fuzz 0 < .bcr/patches/*.patch
      - uses: lycheeverse/lychee-action@a8c4c7cb88f0c7386610c35eb25108e448569cb0 # v2.7.0
        with:
          # Allow 503 Service Unavailable when rate limited
          args: --accept '200..=204,503' --base ${{ github.workspace }} --verbose --no-progress './**/*.md' './**/*.html'
          fail: false # sigh
      - name: "List examples that have a tools/format folder"
        id: set-format-matrix
        run: |
          folders=$(find examples -type d -path "*/tools/format" | sed 's|/tools/format||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix=$folders" >> "$GITHUB_OUTPUT"
          echo "Generated format matrix: $folders"
      - name: "List examples that have a tools/lint folder"
        id: set-lint-matrix
        run: |
          folders=$(find examples -type d -path "*/tools/lint" | sed 's|/tools/lint||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix=$folders" >> "$GITHUB_OUTPUT"
          echo "Generated lint matrix: $folders"
      - name: "Find all examples that have test/*.bats files"
        id: set-test-matrix
        run: |
          folders=$(find examples -name "*.bats" -path "*/test/*" | sed 's|/test/.*||' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix=$folders" >> "$GITHUB_OUTPUT"
          echo "Generated test matrix: $folders"
  format:
    needs: list-examples
    # Our version of clang-format has some deps that aren't satisfiable on newer ubuntu yet
    runs-on: ${{ matrix.folder == 'examples/cpp' && 'ubuntu-22.04' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        folder: ${{ fromJson(needs.list-examples.outputs.format-matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with: &bazelrc
          bazelrc: |
            common     --show_progress_rate_limit=60
            common     --show_timestamps
            build:lint --no@aspect_rules_lint//lint:color
      # Permit this gross non-hermetic dependency
      - if: matrix.folder == 'examples/cpp'
        run: sudo apt-get update && sudo apt-get install -y libtinfo5
      # TODO: Fix for Bazel 9
      - if: matrix.folder == 'examples/csharp' || matrix.folder == 'examples/fsharp' || matrix.folder == 'examples/nodejs'
        run: echo "USE_BAZEL_VERSION=8.x" >> "$GITHUB_ENV"
      - run: bazel run //tools/format
        working-directory: ${{ matrix.folder }}
  integration-test:
    needs: list-examples
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        folder: ${{ fromJson(needs.list-examples.outputs.test-matrix) }}
        include:
          - folder: format
        exclude:
          # FIXME: these are failing, diagnose.
          - folder: examples/python
          - folder: examples/cpp
          - folder: examples/java
          - folder: examples/shell
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
      - name: Setup bats
        uses: mig4/setup-bats@af9a00deb21b5d795cabfeaa8d9060410377686d # v1
        with:
          bats-version: "1.8.2"
      - name: Setup bats helpers
        uses: brokenpip3/setup-bats-libs@adb596631d41c8e1da2466833a66ed2c321a4157 # 0.0.3
        with:
          support-path: /usr/lib/bats/bats-support
          support-version: "0.3.0"
          assert-path: /usr/lib/bats/bats-assert
          assert-version: "2.1.0"
      # TODO: Fix for Bazel 9
      - if: matrix.folder == 'examples/java' || matrix.folder == 'examples/shell'  || matrix.folder == 'examples/kotlin' || matrix.folder == 'format'
        run: echo "USE_BAZEL_VERSION=8.x" >> "$GITHUB_ENV"

      - name: "Integration test"
        working-directory: ${{ matrix.folder }}
        run: bats ./test
  lint:
    needs: list-examples
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        folder: ${{ fromJson(needs.list-examples.outputs.lint-matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with: *bazelrc
      # TODO: Fix for Bazel 9
      - if: matrix.folder == 'examples/cpp' || matrix.folder == 'examples/kotlin' || matrix.folder == 'examples/nodejs'
        run: echo "USE_BAZEL_VERSION=8.x" >> "$GITHUB_ENV"

      - name: Lint
        working-directory: ${{ matrix.folder }}
        run: |
          bazel build --config=lint --output_groups=rules_lint_human //...

          bazel build --config=lint \
            --output_groups=rules_lint_patch \
            --@aspect_rules_lint//lint:fix \
            //...
  # Same examples as `lint`, exercised through `aspect lint` — the
  # better-DX entry point users actually run. Each example registers its
  # linter aspects in `.aspect/config.axl`, so no `--config=lint` is needed.
  #
  # `--strategy=soft` surfaces findings across the whole tree without failing
  # on them, matching the `lint` job's `bazel build --output_groups=...`
  # (which produces reports for all targets and exits 0); the example fixtures
  # carry seeded violations on purpose. No aspect-api-token — change detection
  # resolves from git and the unactionable App-token tip is silenced.
  lint-aspect-cli:
    needs: list-examples
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        folder: ${{ fromJson(needs.list-examples.outputs.lint-matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
      # TODO: Fix for Bazel 9
      - if: matrix.folder == 'examples/cpp' || matrix.folder == 'examples/kotlin' || matrix.folder == 'examples/nodejs'
        run: echo "USE_BAZEL_VERSION=8.x" >> "$GITHUB_ENV"

      - name: aspect lint
        working-directory: ${{ matrix.folder }}
        env:
          folder: ${{ matrix.folder }}
        run: |
          key="lint-${folder//\//-}"
          aspect lint --task-key="$key" --strategy=soft --tips:silence=add-aspect-api-token-github-actions -- //...
          aspect lint --task-key="$key-fix" --fix --strategy=soft --tips:silence=add-aspect-api-token-github-actions -- //...
  # Build & test the root workspace through `aspect test` on Linux across Bazel
  # versions. Complements `test` below, which covers macOS via vanilla Bazel.
  aspect-test:
    name: aspect-test (${{ matrix.workspace.path }}, ${{ matrix.bazel.id }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - { path: ".", slug: "root" }
        bazel:
          - { id: "bazel-7", version: "7.x", flags: "" }
          - { id: "bazel-8", version: "8.x", flags: "" }
          - { id: "bazel-9", version: "9.x", flags: "" }
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Test
        working-directory: ${{ matrix.workspace.path }}
        run: aspect test --task-key=test-${{ matrix.workspace.slug }}-${{ matrix.bazel.id }} ${{ matrix.bazel.flags }} -- //...
  test:
    strategy:
      matrix:
        # Linux is covered by the aspect-test job above
        os:
          - macos-latest
          # TODO(alex): lots of places are missing windows...
          # - windows-latest
        version:
          - 7.x
          - 8.x
          - 9.x
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          repository-cache: ${{ inputs.mount_bazel_caches }}
          bazelrc: |
            common --announce_rc
            common --color=yes
      - name: Test
        # Reduce time on macos runners by testing one example
        working-directory: examples/java
        env:
          USE_BAZEL_VERSION: ${{ matrix.version }}
        run: bazel test //...
