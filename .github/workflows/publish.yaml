# See https://github.com/bazel-contrib/publish-to-bcr
name: Publish to BCR

on:
  # Run the publish workflow after a successful release
  # Can be triggered from the release.yaml workflow
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
    secrets:
      BCR_PUBLISH_TOKEN:
        required: true
  # In case of problems, let release engineers retry by manually dispatching
  # the workflow from the GitHub UI
  workflow_dispatch:
    inputs:
      tag_name:
        required: true
        type: string

jobs:
  publish:
    # SLSA trusted-builder reusable workflows MUST be referenced by a semantic
    # version tag, not a commit SHA: slsa-verifier reads the builder ref from the
    # provenance and rejects a bare SHA ("unexpected ref type"), which breaks the
    # source.json attestation that BCR's presubmit verifies. Do not SHA-pin this.
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@v1.2.0
    with:
      draft: false
      tag_name: ${{ inputs.tag_name }}
      # GitHub repository which is a fork of the upstream where the Pull Request will be opened.
      registry_fork: aspect-build/bazel-central-registry
    permissions:
      attestations: write
      contents: write
      id-token: write
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
